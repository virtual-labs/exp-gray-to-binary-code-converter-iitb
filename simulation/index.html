<!DocType html>
<html>
    <head>
        <title> Digital Logic Design Simulator </title>
        <link rel="stylesheet" href="./css/Style.css">
        <script src="./js/Custom_Prompt.js" ></script>
        <script src="./js/Connection.js" ></script>
        <script src="./js/Control_Manager.js" ></script>
        <script src="./js/IC.js" ></script>
        <script src="./js/IC_Base.js"></script>
        <script src="./js/IC_Data/IC_List.js"></script>
        <script src="./js/Linked_List.js"></script>
        <script src="./js/LED.js" ></script>
        <script src="./js/LED_Port.js" ></script>
        <script src="./js/Pin.js" ></script>
        <script src="./js/Priority_Queue.js"></script>
        <script src="./js/Path_Finder.js"></script>
        <script src="./js/Seven_Segment_Display.js"></script>
        <script src="./js/Simulator.js"></script>
        <script src="./js/Switch.js"></script>
        <script src="./js/Tree.js"></script>
        <script src="./js/Timer_Port.js"></script>
        <script src="./js/Timing_Diagram.js"></script>
        <script src="./js/Vertex_Tree.js"></script>
    </head>
    <body onLoad="Load_Simulator(); Load_Exp_03();">
		<div style="padding: 10px 40px;">
			<h3> Inputs </h3>
			<ul>
				<li>G2 : I/P15</li>
				<li>G1 : I/P14</li>
				<li>G0 : I/P13</li>
			</ul>
			<h3> Outputs </h3>
			<ul>
				<li>B2 : O/P15</li>
				<li>B1 : O/P14</li>
				<li>B0 : O/P13</li>
			</ul>
		</div>        
        <div ID="Operational_Panel">
            <div class="Operation" tabindex="-1" id="No_Operation_Mode" onclick="ICBase_Mode = IC_Base_Mode.Show_Datasheet;alert('Please Select the IC-Base whose IC you want see.');">Show Datasheet</div>
            <div class="Operation" tabindex="-1" id="No_Operation_Mode" onclick="ICBase_Mode = IC_Base_Mode.No_Operation_Mode;">Cancel</div>
            <div class="Operation" tabindex="-1" id="" onclick=""></div>
            <div class="Operation" tabindex="-1" id="Generate_Truth_Table" onclick="Control_Manager.prototype.Generate_Truth_Table('Truth_Table')">Generate Truth Table</div>
            <div class="Operation" tabindex="-1" id="" onclick=""></div>
            <div class="Operation" tabindex="-1" id="Debuge" onclick="Debuge_Mode = !Debuge_Mode; Control_Manager.prototype.DisplayGrid(); this.innerHTML = 'Debug Mode : <br/>' + (Debuge_Mode ? 'ON' : 'OFF');">Debug Mode</div>
        </div>
        <div ID="DELSimulator">
            <canvas id="mycanvas"></canvas>
        </div>
        <div id="PopUp_Background"></div>
        <div id="PopUp"></div>
        
        <div style="padding-left:50px" id="Truth_Table"></div>
        <br><br>
        <input type="button" value="Capture" onclick="TimingDiagram.Start_Timer();">
        <input type="button" value="Stop Capture" onclick="TimingDiagram.Stop_Timer();">
        <input type="button" value="Prev" onclick="TimingDiagram.Prev_Frame();">
        <input type="button" value="Next" onclick="TimingDiagram.Next_Frame();">
        <br>
        <canvas id="TimingDiagram" height="600px" width= "1000px"></canvas>
    <script src="../assets/js/iframeResize.js"></script>
        
        </body>
</html>
